name: Build llama.cpp CUDA 12.4 Ampere

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-ampere80.yml"

permissions:
  contents: read

env:
  LLAMA_CPP_REF: b9637
  ARTIFACT_NAME: llama-cpp-cuda12-ampere80

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04

    steps:
      - name: Install build tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates cmake g++ git make ninja-build patchelf
          rm -rf /var/lib/apt/lists/*

      - name: Fetch pinned llama.cpp source
        run: |
          git clone --depth 1 --branch "${LLAMA_CPP_REF}" \
            https://github.com/ggml-org/llama.cpp.git /src/llama.cpp
          git -C /src/llama.cpp rev-parse HEAD | tee source-commit.txt

      - name: Build CUDA sm_80 binaries
        run: |
          cmake -S /src/llama.cpp -B /build/llama.cpp -G Ninja \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES=80 \
            -DCMAKE_EXE_LINKER_FLAGS=-Wl,--allow-shlib-undefined,-rpath-link,/usr/local/cuda/targets/x86_64-linux/lib \
            -DGGML_NATIVE=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_UI=OFF \
            -DLLAMA_USE_PREBUILT_UI=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /build/llama.cpp --target \
            llama-cli llama-server llama-quantize --parallel "$(nproc)"

      - name: Package and verify complete runtime bundle
        run: |
          set -eu
          BUNDLE="dist/${ARTIFACT_NAME}"
          mkdir -p "${BUNDLE}/bin" "${BUNDLE}/lib"

          cp /build/llama.cpp/bin/llama-cli "${BUNDLE}/bin/"
          cp /build/llama.cpp/bin/llama-server "${BUNDLE}/bin/"
          cp /build/llama.cpp/bin/llama-quantize "${BUNDLE}/bin/"

          for library in /build/llama.cpp/bin/*.so*; do
            if [ -f "${library}" ] && [ ! -L "${library}" ]; then
              patchelf --set-rpath '$ORIGIN' "${library}"
            fi
          done
          cp -a /build/llama.cpp/bin/*.so* "${BUNDLE}/lib/"

          CUDA_LIB=/usr/local/cuda/targets/x86_64-linux/lib
          cp -a "${CUDA_LIB}"/libcudart.so.12* "${BUNDLE}/lib/"
          cp -a "${CUDA_LIB}"/libcublas.so.12* "${BUNDLE}/lib/"
          cp -a "${CUDA_LIB}"/libcublasLt.so.12* "${BUNDLE}/lib/"
          cp -a "${CUDA_LIB}"/libnvJitLink.so.12* "${BUNDLE}/lib/"

          for library in /usr/lib/x86_64-linux-gnu/libnccl.so*; do
            if [ -e "${library}" ]; then
              cp -a "${library}" "${BUNDLE}/lib/"
            fi
          done

          for executable in "${BUNDLE}"/bin/*; do
            patchelf --set-rpath '$ORIGIN/../lib' "${executable}"
          done

          cp source-commit.txt "${BUNDLE}/"
          {
            echo "llama.cpp ref: ${LLAMA_CPP_REF}"
            echo "CUDA toolkit: 12.4.1"
            echo "CUDA architecture: sm_80"
            echo "glibc baseline: Ubuntu 22.04"
          } > "${BUNDLE}/BUILD-INFO.txt"

          CUDA_BACKEND="$(find "${BUNDLE}/lib" -type f -name 'libggml-cuda.so.*' | head -n 1)"
          test -n "${CUDA_BACKEND}"
          cuobjdump --list-elf "${CUDA_BACKEND}" | tee cuda-architectures.txt
          grep -q 'sm_80' cuda-architectures.txt

          for executable in "${BUNDLE}"/bin/*; do
            echo "=== ldd ${executable} ==="
            REPORT="$(LD_LIBRARY_PATH="${PWD}/${BUNDLE}/lib" ldd "${executable}")"
            printf '%s\n' "${REPORT}"
            UNEXPECTED="$(printf '%s\n' "${REPORT}" | grep 'not found' | grep -v 'libcuda.so.1' || true)"
            test -z "${UNEXPECTED}"
          done

          tar -C dist -czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"
          gzip -t "${ARTIFACT_NAME}.tar.gz"
          tar -tzf "${ARTIFACT_NAME}.tar.gz" >/dev/null
          sha256sum "${ARTIFACT_NAME}.tar.gz" > "${ARTIFACT_NAME}.tar.gz.sha256"

          echo "=== bundle contents ==="
          find "${BUNDLE}" -maxdepth 2 -type f -exec ls -lh {} \;
          cat "${ARTIFACT_NAME}.tar.gz.sha256"

      - name: Upload verified runtime bundle
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-cuda12-ampere80
          path: |
            llama-cpp-cuda12-ampere80.tar.gz
            llama-cpp-cuda12-ampere80.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
